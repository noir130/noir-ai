<body>

<div class="container">

<h1>J.A.R.V.I.S</h1>

<div class="jarvis-ring">
<div class="jarvis-core"></div>
</div>

<div id="out" class="chat-box"></div>

<div class="input-area">

<input id="msg" placeholder="Type message">

<button onclick="chat()">Send</button>

<button onclick="startVoice()">🎤</button>

</div>

</div>

<script>

function startVoice(){

const recognition =
new webkitSpeechRecognition();

recognition.lang = "en-US";

recognition.onresult = function(event){

document.getElementById("msg").value =
event.results[0][0].transcript;

chat();

};

recognition.start();

}

async function chat() {

const text =
document.getElementById("msg").value;

document.getElementById("msg").value = "";

document.getElementById("out").innerHTML =
'<div class="typing">🤖 Thinking...</div>';

try {

let response = await fetch(
"https://api.groq.com/openai/v1/chat/completions",
{
method: "POST",

headers: {
"Content-Type": "application/json",

"Authorization":
"Bearer YOUR_GROQ_API_KEY"
},

body: JSON.stringify({

model: "llama-3.3-70b-versatile",

messages: [
{
role: "user",
content: text
}
]

})

}
);

const data =
await response.json();

const botReply =
data.choices[0].message.content;

document.getElementById("out").innerHTML =
'<div class="bot" id="botmsg">🤖 </div>';

let i = 0;

const typing = setInterval(() => {

document.getElementById("botmsg").innerHTML =
"🤖 " + botReply.substring(0, i);

i++;

if(i > botReply.length){

clearInterval(typing);

const speak =
new SpeechSynthesisUtterance(botReply);

speechSynthesis.speak(speak);

}

}, 25);

}
catch(err){

document.getElementById("out").innerHTML =
'<div class="bot">⚠ Error</div>';

console.log(err);

}

}

</script>

</body>
