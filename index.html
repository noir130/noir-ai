<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
radial-gradient(circle at center,#07111f,#020617 70%);

overflow:hidden;
color:white;
}

/* MAIN CONTAINER */

.container{
width:430px;
height:760px;

padding:20px;

border-radius:35px;

background:rgba(255,255,255,0.05);

backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

border:1px solid rgba(0,255,255,0.15);

box-shadow:
0 0 25px rgba(0,255,255,0.12),
0 0 60px rgba(0,255,255,0.05);

position:relative;

display:flex;
flex-direction:column;
justify-content:space-between;

overflow:hidden;
}

/* JARVIS TITLE */

h1{
text-align:center;

font-size:54px;
letter-spacing:8px;

margin-top:10px;

color:#67e8f9;

text-shadow:
0 0 10px #06b6d4,
0 0 25px #06b6d4,
0 0 40px #0891b2;
}

/* CENTER RING */

.jarvis-ring{
position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-55%);

width:220px;
height:220px;

border-radius:50%;

border:3px solid rgba(0,255,255,0.6);

box-shadow:
0 0 25px cyan,
inset 0 0 25px cyan;

display:flex;
justify-content:center;
align-items:center;

animation:rotate 10s linear infinite;
}

.jarvis-ring::before{
content:"";

position:absolute;

width:170px;
height:170px;

border-radius:50%;

border:3px dashed rgba(0,255,255,0.7);

animation:rotateReverse 8s linear infinite;
}

.jarvis-ring::after{
content:"";

position:absolute;

width:120px;
height:120px;

border-radius:50%;

border:2px solid rgba(0,255,255,0.5);

box-shadow:
0 0 15px cyan;

}

.jarvis-core{
width:70px;
height:70px;

border-radius:50%;

background:cyan;

box-shadow:
0 0 20px cyan,
0 0 40px cyan;

animation:pulse 2s infinite;
}

/* CHAT AREA */

.chat-box{
height:180px;

overflow-y:auto;

padding:12px;

border-radius:20px;

background:rgba(255,255,255,0.04);

border:1px solid rgba(0,255,255,0.1);

display:flex;
flex-direction:column;

gap:10px;

margin-bottom:20px;

backdrop-filter:blur(10px);
}

/* BOT MESSAGE */

.bot{
padding:14px;

border-radius:18px;

background:rgba(0,255,255,0.08);

border:1px solid rgba(0,255,255,0.15);

color:#e0f2fe;

line-height:1.5;

animation:fade 0.3s ease;
}

/* TYPING */

.typing{
color:#67e8f9;

font-style:italic;
padding:5px;
}

/* INPUT AT BOTTOM */

.input-area{
display:flex;
gap:10px;
margin-top:auto;
}

input{
flex:1;

padding:16px;

border:none;
outline:none;

border-radius:18px;

background:rgba(255,255,255,0.07);

border:1px solid rgba(0,255,255,0.15);

color:white;

font-size:16px;

backdrop-filter:blur(10px);
}

input::placeholder{
color:#94a3b8;
}

/* BUTTONS */

button{
padding:15px 18px;

border:none;

border-radius:18px;

cursor:pointer;

background:#06b6d4;

color:white;

font-size:16px;
font-weight:bold;

transition:0.3s;

box-shadow:
0 0 15px rgba(6,182,212,0.5);
}

button:hover{
transform:scale(1.05);

box-shadow:
0 0 25px rgba(6,182,212,0.9);
}

/* ANIMATIONS */

@keyframes rotate{

from{
transform:translate(-50%,-55%) rotate(0deg);
}

to{
transform:translate(-50%,-55%) rotate(360deg);
}

}

@keyframes rotateReverse{

from{
transform:rotate(360deg);
}

to{
transform:rotate(0deg);
}

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.1);
}

100%{
transform:scale(1);
}

}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* SCROLLBAR */

.chat-box::-webkit-scrollbar{
width:5px;
}

.chat-box::-webkit-scrollbar-thumb{
background:#06b6d4;
border-radius:10px;
}

</style>

<body>

</html>
