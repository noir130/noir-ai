<!DOCTYPE html>
<html>

<head>
  <title>Noir AI</title>
</head>

<body>

<h1>Noir AI</h1>

<input id="msg" placeholder="Type message">
<button onclick="chat()">Send</button>

<pre id="out"></pre>

<script>

async function chat() {

  const text =
    document.getElementById("msg").value;

  document.getElementById("out").innerText =
    "Thinking...";

  try {

    // ===== TRY GROQ FIRST =====

    let response = await fetch(
      "https://api.groq.com/openai/v1/chat/completions",
      {
        method: "POST",

        headers: {
          "Content-Type": "application/json",

          "Authorization":
            "Bearer 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"
        },

        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",

          messages: [
            {
              role: "user",
              content: text
            }
          ]
        })
      }
    );

    let data = await response.json();

    console.log(data);

    // ===== IF GROQ FAILS -> USE FREELLMAPI =====

    if (data.error) {

      response = await fetch(
        "https://free.llmapi.com/api/v1/chat/completions",
        {
          method: "POST",

          headers: {
            "Content-Type": "application/json",

            "Authorization":
              "Bearer freellmapi-6f21ae601bd230cfcc0fb8fd8fc08a50d6512edb3ac3af14"
          },

          body: JSON.stringify({
            model: "openai/gpt-oss-120b",

            messages: [
              {
                role: "user",
                content: text
              }
            ]
          })
        }
      );

      data = await response.json();

      console.log(data);
    }

    document.getElementById("out").innerText =
      data.choices[0].message.content;

  }

  catch(err) {

    console.log(err);

    document.getElementById("out").innerText =
      "Error: " + err;
  }
}

</script>

</body>
</html>
