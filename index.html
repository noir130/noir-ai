<!DOCTYPE html>
<html>
<head>

<title>NOIR AI</title>

<style>

body{
margin:0;
background:#020617;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:390px;
height:820px;
background:#07132b;
border-radius:30px;
padding:20px;
box-sizing:border-box;
box-shadow:0 0 40px #00e5ff55;
position:relative;
}

.hud{
width:180px;
height:180px;
border-radius:50%;
border:4px solid #00e5ff;
margin:auto;
margin-top:20px;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 0 40px #00e5ff;
}

.hud img{
width:90px;
}

.chat-box{
margin-top:25px;
height:430px;
overflow-y:auto;
background:#0f172a;
border-radius:20px;
padding:10px;
}

.bot-msg,
.user-msg{
padding:15px;
border-radius:15px;
margin:10px 0;
max-width:85%;
color:white;
line-height:1.5;
}

.bot-msg{
background:#1e293b;
}

.user-msg{
background:#06b6d4;
margin-left:auto;
}

.input-area{
position:absolute;
bottom:20px;
left:20px;
right:20px;
display:flex;
gap:10px;
}

input{
flex:1;
padding:16px;
border:none;
border-radius:16px;
background:#1e293b;
color:white;
font-size:16px;
outline:none;
}

button{
width:55px;
border:none;
border-radius:16px;
background:#06d4ff;
color:white;
font-size:20px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="hud">
<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">
</div>

<div class="chat-box" id="out">

<div class="bot-msg">
🤖 Hello! I am Noir AI.
</div>

</div>

<div class="input-area">

<input
type="text"
id="msg"
placeholder="Ask anything..."
>

<button onclick="chat()">➤</button>

</div>

</div>

<script>

async function chat(){

const text =
document.getElementById("msg").value;

if(!text) return;

const out =
document.getElementById("out");

out.innerHTML += `
<div class="user-msg">
🧑 ${text}
</div>
`;

document.getElementById("msg").value = "";

out.innerHTML += `
<div class="bot-msg" id="typing">
🤖 Thinking...
</div>
`;

out.scrollTop =
out.scrollHeight;

try{

const response = await fetch(
"https://noir-backend-bf6s.onrender.com/chat",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:text
})

}
);

const data =
await response.json();

document
.getElementById("typing")
.remove();

out.innerHTML += `
<div class="bot-msg">
🤖 ${data.reply}
</div>
`;

out.scrollTop =
out.scrollHeight;

const speak =
new SpeechSynthesisUtterance(
data.reply
);

speechSynthesis.speak(speak);

}
catch(err){

document
.getElementById("typing")
.remove();

out.innerHTML += `
<div class="bot-msg">
❌ Backend Error
</div>
`;

console.log(err);

}

}

document
.getElementById("msg")
.addEventListener(
"keypress",
function(e){

if(e.key==="Enter"){
chat();
}

}
);

</script>

</body>
</html>
