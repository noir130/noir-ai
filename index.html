<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOIR AI</title>

<style>

/* ===== RESET ===== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

/* ===== BODY ===== */

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
    radial-gradient(circle at center,
    #021b3a 0%,
    #010814 60%,
    #000814 100%);
}

/* ===== BACKGROUND GLOW ===== */

body::before{
    content:"";
    position:absolute;
    width:800px;
    height:800px;
    background:
    radial-gradient(circle,
    rgba(0,229,255,0.15),
    transparent 70%);
    filter:blur(40px);
}

/* ===== MAIN CONTAINER ===== */

.container{
    position:relative;
    width:430px;
    height:760px;
    border-radius:35px;
    overflow:hidden;

    background:
    rgba(255,255,255,0.04);

    backdrop-filter:blur(25px);

    border:
    1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 0 30px rgba(0,229,255,0.25),
    inset 0 0 20px rgba(255,255,255,0.03);
}

/* ===== TOP SECTION ===== */

.top{
    height:330px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* ===== JARVIS RING ===== */

.jarvis-ring{
    position:relative;
    width:230px;
    height:230px;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ===== RINGS ===== */

.ring1,
.ring2,
.ring3,
.ring4{
    position:absolute;
    border-radius:50%;
}

.ring1{
    width:230px;
    height:230px;
    border:4px solid #00e5ff;
    box-shadow:0 0 25px #00e5ff;
    animation:spin 10s linear infinite;
}

.ring2{
    width:180px;
    height:180px;
    border:4px dashed #00e5ff;
    animation:spinReverse 6s linear infinite;
}

.ring3{
    width:120px;
    height:120px;
    border:3px solid #7df9ff;
    box-shadow:0 0 20px #00e5ff;
    animation:pulse 2s infinite;
}

.ring4{
    width:70px;
    height:70px;
    background:#00e5ff22;
    backdrop-filter:blur(10px);
    box-shadow:0 0 20px #00e5ff;
}

/* ===== CENTER AI ===== */

.center-ai{
    position:absolute;
    font-size:65px;
    z-index:10;
    filter:drop-shadow(0 0 15px #00e5ff);
}

/* ===== TITLE ===== */

h1{
    margin-top:15px;
    color:#8ff4ff;
    letter-spacing:10px;
    font-size:42px;
    text-shadow:0 0 20px #00e5ff;
}

/* ===== CHAT BOX ===== */

.chat-box{
    position:absolute;
    bottom:110px;
    left:20px;
    right:20px;
    top:350px;

    overflow-y:auto;

    padding:15px;

    border-radius:22px;

    background:
    rgba(255,255,255,0.04);

    border:
    1px solid rgba(255,255,255,0.05);
}

/* ===== SCROLL ===== */

.chat-box::-webkit-scrollbar{
    width:5px;
}

.chat-box::-webkit-scrollbar-thumb{
    background:#00e5ff;
    border-radius:10px;
}

/* ===== USER ===== */

.user{
    margin:10px 0;
    padding:14px;

    border-radius:18px;

    background:
    rgba(0,229,255,0.18);

    color:white;

    border:
    1px solid rgba(0,229,255,0.4);

    animation:fadeIn 0.3s;
}

/* ===== BOT ===== */

.bot{
    margin:10px 0;
    padding:14px;

    border-radius:18px;

    background:
    rgba(255,255,255,0.08);

    color:white;

    border:
    1px solid rgba(255,255,255,0.08);

    animation:fadeIn 0.3s;
}

/* ===== TYPING ===== */

.typing{
    color:#7df9ff;
    margin:10px 0;
    animation:blink 1s infinite;
}

/* ===== INPUT AREA ===== */

.input-area{
    position:absolute;
    bottom:20px;
    left:20px;
    right:20px;

    display:flex;
    gap:10px;
}

/* ===== INPUT ===== */

input{
    flex:1;

    padding:16px;

    border:none;
    outline:none;

    border-radius:18px;

    background:
    rgba(255,255,255,0.08);

    color:white;

    font-size:16px;

    border:
    1px solid rgba(255,255,255,0.08);
}

/* ===== BUTTON ===== */

button{
    width:65px;

    border:none;

    border-radius:18px;

    background:#00d9ff;

    color:white;

    cursor:pointer;

    font-size:18px;

    transition:0.3s;

    box-shadow:0 0 15px #00d9ff66;
}

button:hover{
    transform:scale(1.05);
    background:#00e5ff;
}

/* ===== ANIMATIONS ===== */

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

@keyframes spinReverse{
    from{
        transform:rotate(360deg);
    }
    to{
        transform:rotate(0deg);
    }
}

@keyframes pulse{
    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.08);
    }

    100%{
        transform:scale(1);
    }
}

@keyframes blink{
    50%{
        opacity:0.3;
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- TOP -->

    <div class="top">

        <!-- JARVIS RING -->

        <div class="jarvis-ring">

            <div class="ring1"></div>
            <div class="ring2"></div>
            <div class="ring3"></div>
            <div class="ring4"></div>

            <div class="center-ai">
                🤖
            </div>

        </div>

        <h1>NOIR AI</h1>

    </div>

    <!-- CHAT -->

    <div id="out" class="chat-box">

        <div class="bot">
            🤖 Hello! I am Noir AI.
        </div>

    </div>

    <!-- INPUT -->

    <div class="input-area">

        <input
        id="msg"
        placeholder="Ask anything..."
        >

        <button onclick="chat()">
            ➤
        </button>

        <button onclick="startVoice()">
            🎤
        </button>

    </div>

</div>

<script>

/* ===== VOICE INPUT ===== */

function startVoice(){

    const recognition =
    new webkitSpeechRecognition();

    recognition.lang = "en-US";

    recognition.onresult = function(event){

        document.getElementById("msg").value =
        event.results[0][0].transcript;

        chat();
    }

    recognition.start();
}

/* ===== CHAT ===== */

async function chat(){

    const text =
    document.getElementById("msg").value;

    if(text.trim() === "") return;

    document.getElementById("msg").value = "";

    const out =
    document.getElementById("out");

    /* USER MESSAGE */

    out.innerHTML +=
    `<div class="user">
    🧑 ${text}
    </div>`;

    /* TYPING */

    out.innerHTML +=
    `<div class="typing" id="typing">
    🤖 Noir AI is thinking...
    </div>`;

    out.scrollTop =
    out.scrollHeight;

    try{

        let response;

        /* ===== TRY FREELLMAPI ===== */

        try{

            response = await fetch(
            "https://api.freellmapi.com/openai/v1/chat/completions",

            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json",

                    "Authorization":
                    "Bearer freellmapi-6f21ae601bd230cfcc0fb8fd8fc08a50d6512edb3ac3af14"
                },

                body:JSON.stringify({

                    model:"gpt-oss-120b",

                    messages:[
                        {
                            role:"user",
                            content:text
                        }
                    ]
                })
            });

            if(!response.ok){
                throw new Error("FreeLLMAPI failed");
            }

        }

        /* ===== FALLBACK TO GROQ ===== */

        catch{

            response = await fetch(
            "https://api.groq.com/openai/v1/chat/completions",

            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json",

                    "Authorization":
                    "Bearer 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"
                },

                body:JSON.stringify({

                    model:"llama3-70b-8192",

                    messages:[
                        {
                            role:"user",
                            content:text
                        }
                    ]
                })
            });

        }

        let data =
        await response.json();

        document
        .getElementById("typing")
        .remove();

        const reply =
        data.choices[0].message.content;

        /* BOT MESSAGE */

        out.innerHTML +=
        `<div class="bot">
        🤖 ${reply}
        </div>`;

        /* VOICE OUTPUT */

        const speak =
        new SpeechSynthesisUtterance(reply);

        speak.rate = 1;
        speak.pitch = 1;

        speechSynthesis.speak(speak);

        out.scrollTop =
        out.scrollHeight;

    }

    catch(err){

        document
        .getElementById("typing")
        .remove();

        out.innerHTML +=
        `<div class="bot">
        ❌ AI Error
        </div>`;

        console.log(err);
    }
}

/* ===== ENTER KEY ===== */

document
.getElementById("msg")
.addEventListener(
"keypress",

function(e){

    if(e.key === "Enter"){
        chat();
    }

});

</script>

</body>
</html>
