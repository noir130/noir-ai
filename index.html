<!DOCTYPE html>
<html>

<head>
  <title>Noir AI</title>
</head>

<body>

<h1>Noir AI</h1>

<input id="msg" placeholder="Type message">
<button onclick="chat()">Send</button>

<pre id="out"></pre>

<script>
  async function chat() {

  const text =
    document.getElementById("msg").value;

  document.getElementById("out").innerText =
    "Thinking...";

  try {

    // TRY GROQ FIRST

    let response = await fetch(
      "https://api.groq.com/openai/v1/chat/completions",
      {
        method: "POST",

        headers: {
          "Content-Type": "application/json",

          "Authorization":
            "Bearer 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"
        },

        body: JSON.stringify({
          model: "llama3-8b-8192",

          messages: [
            {
              role: "user",
              content: text
            }
          ]
        })
      }
    );

    let data = await response.json();

console.log(data);

if (data.error) {

  document.getElementById("out").innerText =
    "API Error: " + data.error.message;

  return;
}

document.getElementById("out").innerText =
  data.choices[0].message.content;
        
  catch(err) {

    console.log(err);

    document.getElementById("out").innerText =
      "Error: " + err;
  }
}
</script>

</body>
</html>
