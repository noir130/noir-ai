<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOIR</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
    radial-gradient(circle at center,
    #021b3a 0%,
    #010814 60%,
    #000814 100%);
}

/* MAIN */

.container{
    position:relative;
    width:420px;
    height:760px;

    border-radius:35px;

    background:
    rgba(255,255,255,0.04);

    backdrop-filter:blur(25px);

    border:
    1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 0 35px rgba(0,229,255,0.25);
}

/* CENTER HUD */

.hud{
    position:absolute;
    top:80px;
    left:50%;
    transform:translateX(-50%);

    width:260px;
    height:260px;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* RINGS */

.ring1,
.ring2,
.ring3,
.voice-ring{

    position:absolute;
    border-radius:50%;
}

.ring1{
    width:260px;
    height:260px;

    border:4px solid #00e5ff;

    box-shadow:
    0 0 25px #00e5ff;

    animation:spin 10s linear infinite;
}

.ring2{
    width:200px;
    height:200px;

    border:4px dashed #00e5ff;

    animation:spinReverse 6s linear infinite;
}

.ring3{
    width:140px;
    height:140px;

    border:3px solid #7df9ff;

    box-shadow:
    0 0 20px #00e5ff;
}

/* AI IMAGE */

.bot{
    position:absolute;
    font-size:75px;
    z-index:10;

    filter:
    drop-shadow(0 0 15px #00e5ff);
}

/* VOICE EFFECT */

.voice-ring{
    width:100px;
    height:100px;

    background:
    rgba(0,229,255,0.15);

    box-shadow:
    0 0 20px #00e5ff;

    opacity:0;
}

.speaking .voice-ring{
    animation:voicePulse 0.6s infinite;
    opacity:1;
}

/* CHAT */

.chat-box{
    position:absolute;

    left:20px;
    right:20px;
    bottom:110px;

    height:260px;

    overflow-y:auto;

    border-radius:25px;

    padding:15px;

    background:
    rgba(255,255,255,0.04);

    border:
    1px solid rgba(255,255,255,0.08);
}

/* BOT MESSAGE */

.bot-msg{
    margin:10px 0;

    padding:14px;

    border-radius:18px;

    color:white;

    background:
    rgba(255,255,255,0.08);

    border:
    1px solid rgba(255,255,255,0.08);

    animation:fadeIn 0.4s;
}

/* TYPING */

.typing{
    color:#7df9ff;
    margin:10px 0;
    animation:blink 1s infinite;
}

/* INPUT AREA */

.input-area{
    position:absolute;

    left:20px;
    right:20px;
    bottom:20px;

    display:flex;
    gap:10px;
}

/* INPUT */

input{
    flex:1;

    padding:16px;

    border:none;
    outline:none;

    border-radius:18px;

    background:
    rgba(255,255,255,0.08);

    color:white;

    font-size:16px;

    border:
    1px solid rgba(255,255,255,0.08);
}

/* BUTTONS */

button{
    width:65px;

    border:none;

    border-radius:18px;

    background:#00d9ff;

    color:white;

    cursor:pointer;

    font-size:20px;

    transition:0.3s;

    box-shadow:
    0 0 15px #00d9ff66;
}

button:hover{
    transform:scale(1.05);
}

/* SCROLL */

.chat-box::-webkit-scrollbar{
    width:5px;
}

.chat-box::-webkit-scrollbar-thumb{
    background:#00e5ff;
    border-radius:10px;
}

/* ANIMATION */

@keyframes spin{

    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

@keyframes spinReverse{

    from{
        transform:rotate(360deg);
    }

    to{
        transform:rotate(0deg);
    }
}

@keyframes blink{

    50%{
        opacity:0.3;
    }
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(10px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes voicePulse{

    0%{
        transform:scale(1);
        opacity:0.8;
    }

    50%{
        transform:scale(1.6);
        opacity:0.2;
    }

    100%{
        transform:scale(1);
        opacity:0.8;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- HUD -->

    <div class="hud" id="hud">

        <div class="ring1"></div>
        <div class="ring2"></div>
        <div class="ring3"></div>

        <div class="voice-ring"></div>

        <div class="bot">
            🤖
        </div>

    </div>

    <!-- CHAT -->

    <div id="out" class="chat-box">

        <div class="bot-msg">
            🤖 Hello! I am Noir AI.
        </div>

    </div>

    <!-- INPUT -->

    <div class="input-area">

        <input
        id="msg"
        placeholder="Ask anything..."
        >

        <button onclick="chat()">
            ➤
        </button>

        <button onclick="startVoice()">
            🎤
        </button>

    </div>

</div>

<script>

/* ===== VOICE INPUT ===== */

function startVoice(){

    const recognition =
    new webkitSpeechRecognition();

    recognition.lang = "en-US";

    recognition.onresult = function(event){

        document.getElementById("msg").value =
        event.results[0][0].transcript;

        chat();
    }

    recognition.start();
}

/* ===== CHAT ===== */

async function chat(){

    const text =
    document.getElementById("msg").value;

    if(text.trim() === "") return;

    document.getElementById("msg").value = "";

    const out =
    document.getElementById("out");

    /* TYPING */

    out.innerHTML +=
    `<div class="typing" id="typing">
    🤖 Thinking...
    </div>`;

    out.scrollTop =
    out.scrollHeight;

    try{

        let response;

        /* ===== TRY FREELLMAPI ===== */

        try{

            response = await fetch(
            "https://api.freellmapi.com/openai/v1/chat/completions",

            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json",

                    "Authorization":
                    "Bearer freellmapi-6f21ae601bd230cfcc0fb8fd8fc08a50d6512edb3ac3af14"
                },

                body:JSON.stringify({

                    model:"gpt-oss-120b",

                    messages:[
                        {
                            role:"user",
                            content:text
                        }
                    ]
                })
            });

            if(!response.ok){
                throw new Error("FreeLLMAPI failed");
            }

        }

        /* ===== FALLBACK TO GROQ ===== */

        catch{

            response = await fetch(
            "https://api.groq.com/openai/v1/chat/completions",

            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json",

                    "Authorization":
                    "Bearer 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"
                },

                body:JSON.stringify({

                    model:"llama3-70b-8192",

                    messages:[
                        {
                            role:"user",
                            content:text
                        }
                    ]
                })
            });

        }

        let data =
        await response.json();

        document
        .getElementById("typing")
        .remove();

        const reply =
        data.choices[0].message.content;

        /* SHOW BOT MESSAGE ONLY */

        out.innerHTML +=
        `<div class="bot-msg">
        🤖 ${reply}
        </div>`;

        /* VOICE */

        const speak =
        new SpeechSynthesisUtterance(reply);

        speak.rate = 1;
        speak.pitch = 1;

        /* START VOICE EFFECT */

        document
        .getElementById("hud")
        .classList.add("speaking");

        speak.onend = function(){

            document
            .getElementById("hud")
            .classList.remove("speaking");
        }

        speechSynthesis.speak(speak);

        out.scrollTop =
        out.scrollHeight;

    }

    catch(err){

    const typing =
document.getElementById("typing");

if(typing){
    typing.remove();
}

        out.innerHTML +=
        `<div class="bot-msg">
        ❌ AI Error
        </div>`;

        console.log(err);
    }
}

/* ===== ENTER ===== */

document
.getElementById("msg")
.addEventListener(
"keypress",

function(e){

    if(e.key === "Enter"){
        chat();
    }

});

</script>

</body>
</html>
