<!DOCTYPE html>
<html>

<head>

<title>Noir AI</title>

<style>

body{
  background:#0f172a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.container{
  width:400px;
  background:#1e293b;
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1{
  text-align:center;
  color:#38bdf8;
}

input{
  width:70%;
  padding:12px;
  border:none;
  border-radius:10px;
  outline:none;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#38bdf8;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#0ea5e9;
}

#out{
  margin-top:20px;
  background:#0f172a;
  padding:15px;
  border-radius:10px;
  min-height:100px;
}

</style>

</head>

<body>

<div class="container">

<h1>🤖 Noir AI</h1>

<input id="msg" placeholder="Type message">
<button onclick="chat()">Send</button>

<pre id="out"></pre>


<script>

async function chat() {

  const text =
    document.getElementById("msg").value;

  document.getElementById("out").innerText =
    "Thinking...";

  try {

    // ===== TRY GROQ FIRST =====

    let response = await fetch(
      "https://api.groq.com/openai/v1/chat/completions",
      {
        method: "POST",

        headers: {
          "Content-Type": "application/json",

          "Authorization":
            "Bearer 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"
        },

        body: JSON.stringify({
          model: "llama-3.3-70b-versatile",

          messages: [
            {
              role: "user",
              content: text
            }
          ]
        })
      }
    );

    let data = await response.json();

    console.log(data);

    // ===== IF GROQ FAILS -> USE FREELLMAPI =====

    if (data.error) {

      response = await fetch(
        "https://free.llmapi.com/api/v1/chat/completions",
        {
          method: "POST",

          headers: {
            "Content-Type": "application/json",

            "Authorization":
              "Bearer freellmapi-6f21ae601bd230cfcc0fb8fd8fc08a50d6512edb3ac3af14"
          },

          body: JSON.stringify({
            model: "openai/gpt-oss-120b",

            messages: [
              {
                role: "user",
                content: text
              }
            ]
          })
        }
      );

      data = await response.json();

      console.log(data);
    }

    document.getElementById("out").innerText =
      data.choices[0].message.content;

  }

  catch(err) {

    console.log(err);

    document.getElementById("out").innerText =
      "Error: " + err;
  }
}

</script>

</body>
</html>
