<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOIR AI</title>

<style>

body{
margin:0;
padding:0;
background:#020617;
font-family:Arial, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
width:390px;
height:820px;
background:linear-gradient(180deg,#07132b,#0b1d3a);
border-radius:30px;
padding:20px;
box-sizing:border-box;
box-shadow:0 0 30px #00e5ff55;
position:relative;
overflow:hidden;
}

.hud{
width:180px;
height:180px;
border-radius:50%;
border:4px solid #00e5ff;
margin:20px auto;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 0 40px #00e5ff;
animation:pulse 2s infinite;
}

.hud img{
width:90px;
}

@keyframes pulse{
0%{box-shadow:0 0 20px #00e5ff;}
50%{box-shadow:0 0 50px #00e5ff;}
100%{box-shadow:0 0 20px #00e5ff;}
}

.chat-box{
margin-top:20px;
height:420px;
overflow-y:auto;
padding:10px;
background:#0f172a;
border-radius:20px;
}

.bot-msg,
.user-msg{
padding:14px;
margin:10px 0;
border-radius:15px;
max-width:85%;
line-height:1.5;
font-size:16px;
}

.bot-msg{
background:#1e293b;
color:white;
}

.user-msg{
background:#06b6d4;
color:white;
margin-left:auto;
}

.input-area{
position:absolute;
bottom:20px;
left:20px;
right:20px;
display:flex;
gap:10px;
}

input{
flex:1;
padding:16px;
border:none;
border-radius:16px;
background:#1e293b;
color:white;
font-size:16px;
outline:none;
}

button{
width:60px;
border:none;
border-radius:16px;
background:#06d4ff;
color:white;
font-size:22px;
cursor:pointer;
box-shadow:0 0 20px #06d4ff88;
}

button:hover{
opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<div class="hud">
<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">
</div>

<div class="chat-box" id="out">

<div class="bot-msg">
🤖 Hello! I am Noir AI.
</div>

</div>

<div class="input-area">

<input
type="text"
id="msg"
placeholder="Ask anything..."
>

<button onclick="chat()">➤</button>

<button onclick="startVoice()">🎤</button>

</div>

</div>

<script>

/* =========================
VOICE INPUT
========================= */

function startVoice(){

const recognition =
new webkitSpeechRecognition();

recognition.lang = "en-US";

recognition.onresult = function(event){

document.getElementById("msg").value =
event.results[0][0].transcript;

chat();

};

recognition.start();

}

/* =========================
CHAT FUNCTION
========================= */

async function chat(){

const text =
document.getElementById("msg").value;

if(!text) return;

const out =
document.getElementById("out");

/* USER MESSAGE */

out.innerHTML += `
<div class="user-msg">
🧑 ${text}
</div>
`;

document.getElementById("msg").value = "";

/* THINKING */

out.innerHTML += `
<div class="bot-msg" id="typing">
🤖 Thinking...
</div>
`;

out.scrollTop = out.scrollHeight;

try{

/* BACKEND FETCH */

const response = await fetch(
"http://127.0.0.1:3000/chat",
{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:text
})

});

const data =
await response.json();

/* REMOVE THINKING */

document
.getElementById("typing")
.remove();

let reply =
data.reply;

/* SHOW BOT MESSAGE */

out.innerHTML += `
<div class="bot-msg">
🤖 ${reply}
</div>
`;

out.scrollTop =
out.scrollHeight;

/* SPEAK */

const speak =
new SpeechSynthesisUtterance(reply);

speechSynthesis.speak(speak);

}
catch(err){

document
.getElementById("typing")
.remove();

out.innerHTML += `
<div class="bot-msg">
❌ Backend Error
</div>
`;

console.log(err);

}

}

/* =========================
ENTER KEY
========================= */

document
.getElementById("msg")
.addEventListener(
"keypress",
function(e){

if(e.key==="Enter"){
chat();
}

}
);

</script>

</body>
</html>
