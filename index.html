<style>

body{
  background:#07172a;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.container{
  width:420px;
  background:#1e293b;
  padding:25px;
  border-radius:25px;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

h1{
  text-align:center;
  color:#38bdf8;
  margin-bottom:25px;
  font-size:45px;
}

.chat-box{
  background:#0f172a;
  padding:15px;
  border-radius:15px;
  height:300px;
  overflow-y:auto;
  margin-top:20px;
  font-size:15px;
  line-height:1.5;
}

.input-area{
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:14px;
  border:none;
  border-radius:12px;
  outline:none;
  font-size:16px;
}

button{
  padding:14px 20px;

  border-radius:12px;
  background:#38bdf8;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#0ea5e9;
  transform:scale(1.05);
}

.user{
  background:#2563eb;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
}

.bot{
  background:#334155;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
}

.typing{
  color:#94a3b8;
  font-style:italic;

recognition.lang = "en-US";

recognition.onresult = function(event){

document.getElementById("msg").value =
event.results[0][0].transcript;

chat();

};

recognition.start();

}
