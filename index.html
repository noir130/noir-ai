<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOIR AI</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#020617;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* BACKGROUND GLOW */

body::before{
    content:"";
    position:absolute;
    width:600px;
    height:600px;
    background:radial-gradient(circle,#00e5ff33,transparent 70%);
    filter:blur(80px);
}

/* MAIN HUD */

.container{
    width:430px;
    height:760px;
    background:rgba(10,20,40,0.55);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:35px;
    backdrop-filter:blur(25px);
    box-shadow:
    0 0 25px #00e5ff44,
    inset 0 0 25px rgba(255,255,255,0.03);

    position:relative;
    overflow:hidden;
    padding:25px;
}

/* RING */

.hud{
    width:250px;
    height:250px;
    margin:auto;
    margin-top:10px;
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
}

.ring1{
    position:absolute;
    width:250px;
    height:250px;
    border-radius:50%;
    border:4px solid #00e5ff;
    box-shadow:
    0 0 20px #00e5ff,
    0 0 50px #00e5ff;
    animation:rotate 10s linear infinite;
}

.ring2{
    position:absolute;
    width:190px;
    height:190px;
    border-radius:50%;
    border:4px dashed #00e5ff;
    animation:rotate2 12s linear infinite;
}

.ring3{
    position:absolute;
    width:135px;
    height:135px;
    border-radius:50%;
    border:2px solid #88ffff;
    box-shadow:0 0 20px #00ffff;
}

/* SPEAKING ANIMATION */

.speaking .ring1{
    animation:speak1 .8s infinite alternate;
}

.speaking .ring2{
    animation:speak2 .5s infinite alternate;
}

@keyframes speak1{
    from{
        transform:scale(1);
        opacity:.8;
    }

    to{
        transform:scale(1.08);
        opacity:1;
    }
}

@keyframes speak2{
    from{
        transform:scale(1);
    }

    to{
        transform:scale(.9);
    }
}

@keyframes rotate{
    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

@keyframes rotate2{
    from{
        transform:rotate(360deg);
    }

    to{
        transform:rotate(0deg);
    }
}

.bot{
    position:absolute;
    font-size:65px;
    z-index:5;
    filter:drop-shadow(0 0 15px #00e5ff);
}

/* CHAT */

.chat-box{
    width:100%;
    height:300px;
    margin-top:25px;
    overflow-y:auto;
    padding:10px;
    border-radius:25px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.05);
}

.chat-box::-webkit-scrollbar{
    width:5px;
}

.chat-box::-webkit-scrollbar-thumb{
    background:#00e5ff;
    border-radius:20px;
}

.bot-msg{
    background:rgba(255,255,255,0.08);
    padding:15px;
    border-radius:20px;
    color:white;
    margin-bottom:12px;
    line-height:1.5;
    font-size:18px;
    border:1px solid rgba(255,255,255,0.05);
}

/* INPUT */

.input-area{
    position:absolute;
    bottom:25px;
    left:25px;
    right:25px;
    display:flex;
    gap:12px;
}

.input-area input{
    flex:1;
    height:60px;
    border:none;
    outline:none;
    border-radius:20px;
    padding:0 20px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:18px;
    backdrop-filter:blur(10px);
}

.input-area input::placeholder{
    color:#aaaaaa;
}

.input-area button{
    width:70px;
    border:none;
    border-radius:20px;
    background:#00d9ff;
    color:white;
    font-size:24px;
    cursor:pointer;
    box-shadow:0 0 15px #00e5ff;
    transition:.3s;
}

.input-area button:hover{
    transform:scale(1.05);
}

.typing{
    color:#00e5ff;
    padding:10px;
    font-style:italic;
    animation:blink 1s infinite;
}

@keyframes blink{
    50%{
        opacity:.3;
    }
}

</style>
</head>

<body>

<div class="container">

    <!-- HUD -->

    <div class="hud" id="hud">

        <div class="ring1"></div>
        <div class="ring2"></div>
        <div class="ring3"></div>

        <div class="bot">🤖</div>

    </div>

    <!-- CHAT -->

    <div class="chat-box" id="out">

        <div class="bot-msg">
            🤖 Hello! I am Noir AI.
        </div>

    </div>

    <!-- INPUT -->

    <div class="input-area">

        <input
        type="text"
        id="msg"
        placeholder="Ask anything...">

        <button onclick="chat()">➤</button>

        <button onclick="startVoice()">🎤</button>

    </div>

</div>

<script>

/* =========================
   VOICE INPUT
========================= */

function startVoice(){

    const recognition =
    new webkitSpeechRecognition();

    recognition.lang = "en-US";

    recognition.onresult = function(event){

        document
        .getElementById("msg")
        .value =
        event.results[0][0].transcript;

        chat();

    };

    recognition.start();
}

/* =========================
   CHAT
========================= */

async function chat(){

    const text =
    document.getElementById("msg").value;

    if(!text) return;

    document.getElementById("msg").value = "";

    const out =
    document.getElementById("out");

    out.innerHTML += `
    <div class="typing" id="typing">
    🤖 Thinking...
    </div>
    `;

    out.scrollTop =
    out.scrollHeight;

    let reply = "";

    /* =========================
       TRY FREELLM FIRST
    ========================= */

    try{

        const response =
        await fetch(
        "https://api.freellmapi.com/chat/completions",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
           "Authorization":"Bearer freellmapi-6f21ae601bd230cfcc0fb8fd8fc08a50d6512edb3ac3af14"
            },

            body:JSON.stringify({

                model:"openai/gpt-oss-120b",

                messages:[
                    {
                        role:"user",
                        content:text
                    }
                ]

            })

        });

        const data =
        await response.json();

        reply =
        data.choices[0]
        .message.content;

    }

    catch{

        /* =========================
           GROQ FALLBACK
        ========================= */

        try{

            const response =
            await fetch(
            "https://api.groq.com/openai/v1/chat/completions",
            {
                method:"POST",

                headers:{
                    "Content-Type":"application/json",

                    "Authorization":
                    "Bearer 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"
                },

                body:JSON.stringify({

                    model:"llama3-70b-8192",

                    messages:[
                        {
                            role:"user",
                            content:text
                        }
                    ]

                })

            });

            const data =
            await response.json();

            reply =
            data.choices[0]
            .message.content;

        }

        catch{

            reply =
            "⚠ Unable to connect to AI.";

        }

    }

    /* REMOVE THINKING */

    const typing =
    document.getElementById("typing");

    if(typing){
        typing.remove();
    }

    /* SHOW MESSAGE */

   out.innerHTML += `
<div class="bot-msg">
🤖 ${reply}
</div>
`;

    out.scrollTop =
    out.scrollHeight;

    /* SPEAK */

    const hud =
    document.getElementById("hud");

    hud.classList.add("speaking");

    const speak =
    new SpeechSynthesisUtterance(reply);

    speechSynthesis.speak(speak);

    speak.onend = function(){

        hud.classList.remove("speaking");

    };

}

/* =========================
   ENTER KEY
========================= */

document
.getElementById("msg")
.addEventListener(
"keypress",
function(e){

    if(e.key === "Enter"){
        chat();
    }

});

</script>

</body>
</html>
