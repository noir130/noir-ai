<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(135deg,#eef2ff,#ffffff,#dbeafe);

overflow:hidden;
}

.container{
width:430px;
padding:25px;

border-radius:30px;

background:rgba(255,255,255,0.35);

backdrop-filter:blur(25px);
-webkit-backdrop-filter:blur(25px);

border:1px solid rgba(255,255,255,0.5);

box-shadow:
0 8px 32px rgba(31,38,135,0.18);
}

h1{
text-align:center;
font-size:58px;
margin-bottom:25px;

background:linear-gradient(to right,#38bdf8,#818cf8);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.input-area{
display:flex;
gap:10px;
margin-bottom:18px;
}

input{
flex:1;

padding:15px;

border:none;
outline:none;

border-radius:16px;

background:rgba(255,255,255,0.55);

backdrop-filter:blur(10px);

font-size:16px;
color:#111;

box-shadow:
0 4px 15px rgba(0,0,0,0.05);
}

input::placeholder{
color:#666;
}

button{
padding:14px 18px;

border:none;
border-radius:16px;

cursor:pointer;

background:rgba(56,189,248,0.8);

color:white;

font-size:16px;
font-weight:bold;

transition:0.3s;

box-shadow:
0 4px 15px rgba(56,189,248,0.3);
}

button:hover{
transform:translateY(-2px) scale(1.03);

background:#38bdf8;
}

.chat-box{
height:340px;

overflow-y:auto;

padding:15px;

border-radius:22px;

background:rgba(255,255,255,0.18);

backdrop-filter:blur(12px);

display:flex;
flex-direction:column;

gap:12px;
}

.bot{
padding:14px 16px;

border-radius:18px;

background:rgba(255,255,255,0.55);

color:#111;

line-height:1.5;

box-shadow:
0 4px 15px rgba(0,0,0,0.06);

animation:fade 0.3s ease;
}

.typing{
color:#6366f1;
font-style:italic;
padding:5px;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.chat-box::-webkit-scrollbar{
width:5px;
}

.chat-box::-webkit-scrollbar-thumb{
background:#818cf8;
border-radius:10px;
}

</style>

<body>

<div class="container">

<h1>🤖 Noir AI</h1>

<div class="input-area">
  <input id="msg" placeholder="Type message">
  <button onclick="chat()">Send</button>

  <button onclick="startVoice()">🎤</button>
</div>

<div id="out" class="chat-box"></div>

</div>
  
  
<script>

  function startVoice(){

const recognition =
new webkitSpeechRecognition();

recognition.lang = "en-US";

recognition.onresult = function(event){

document.getElementById("msg").value =
event.results[0][0].transcript;

chat();

};

recognition.start();

} 
  
async function chat() {

.addEventListener("keypress", function(e){

if(e.key === "Enter"){
chat();
}

});

        },

            "Content-Type": "application/json",

            "Authorization":
              "Bearer freellmapi-6f21ae601bd230cfcc0fb8fd8fc08a50d6512edb3ac3af14"
          },

          body: JSON.stringify({
            model: "openai/gpt-oss-120b",

            messages: [
              {
                role: "user",
                content: text
              }
            ]
          })
        }
      );

      data = await response.json();

      console.log(data);
    }


const botReply = data.choices[0].message.content;

document.getElementById("out").innerHTML =
'<div class="bot" id="botmsg">🤖 </div>';

let i = 0;

const typing = setInterval(() => {

document.getElementById("botmsg").innerHTML =
"🤖 " + botReply.substring(0, i);

i++;

if(i > botReply.length){

clearInterval(typing);

const speak = new SpeechSynthesisUtterance(botReply);

speechSynthesis.speak(speak);

}

}, 30);
    
const speak = new SpeechSynthesisUtterance(
data.choices[0].message.content
);

speechSynthesis.speak(speak);

document.getElementById("out").scrollTop =
document.getElementById("out").scrollHeight;
  }

  catch(err) {

    console.log(err);

    document.getElementById("out").innerText =
      "Error: " + err;
  }
}

</script>

</body>
</html>
